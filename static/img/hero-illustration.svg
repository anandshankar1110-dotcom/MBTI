<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#6b46ff"/>
      <stop offset="1" stop-color="#00b4ff"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>

  <!-- subtle background blob -->
  <path d="M150 300c60-120 220-160 360-120s220 160 140 220-260 40-380-20S90 420 150 300z" fill="#eef6ff" opacity="0.9"/>

  <!-- laptop -->
  <rect x="240" y="220" width="240" height="120" rx="12" fill="#1f2937"/>
  <rect x="270" y="240" width="180" height="70" rx="6" fill="#fff"/>
  <rect x="300" y="310" width="120" height="8" rx="4" fill="#ccdffb"/>

  <!-- person (stylized) -->
  <circle cx="200" cy="210" r="44" fill="url(#g1)"/>
  <rect x="170" y="250" width="60" height="80" rx="18" fill="#6b46ff" opacity="0.95"/>

  <!-- coffee cup -->
  <rect x="470" y="270" width="18" height="26" rx="4" fill="#fff"/>
  <path d="M485 272c0 6-4 6-8 6s-6 0-6-6 4-10 6-10 8 4 8 10z" fill="#ffdca8"/>

  <!-- small bubbles / icons -->
  <circle cx="540" cy="120" r="28" fill="#fff" stroke="#dfefff"/>
  <text x="540" y="128" font-size="14" text-anchor="middle" fill="#6b46ff" font-weight="700">INTJ</text>

  <circle cx="580" cy="180" r="22" fill="#fff" stroke="#dfefff"/>
  <text x="580" y="187" font-size="12" text-anchor="middle" fill="#00b4ff">💡</text>

  <circle cx="620" cy="220" r="20" fill="#fff" stroke="#dfefff"/>
  <text x="620" y="227" font-size="12" text-anchor="middle">❤️</text>

</svg>
