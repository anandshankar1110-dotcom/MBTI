<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MBTI Report - {{ serial }}</title>
    <style>
      body{font-family:Segoe UI,Arial,Helvetica;margin:18px}
      .card{max-width:760px;padding:18px;border:1px solid #ddd;border-radius:8px}
      h1{margin-top:0}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>MBTI Report</h1>
      <p><strong>Serial:</strong> {{ serial }}</p>
      <p><strong>Name:</strong> {{ name }}</p>
      <p><strong>DOB:</strong> {{ dob }}</p>
      <p><strong>Gender:</strong> {{ gender }}</p>
      <p><strong>Personality Type:</strong> {{ pcode }}</p>
      <p><strong>Confidence:</strong> {{ confidence }}%</p>
      <p><strong>Career Suggestions:</strong> {{ career }}</p>
      <p><strong>Generated by:</strong> {{ generated_by }}</p>
    </div>
  </body>
</html>
